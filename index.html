<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#080f18; font-family:-apple-system,'Inter','Helvetica Neue',sans-serif; }
input[type=range] { -webkit-appearance:none; appearance:none; width:100%; height:4px;
  border-radius:2px; background:rgba(255,255,255,0.12); outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px;
  border-radius:50%; cursor:pointer; border:2px solid #fff; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:2px; }
table { border-collapse:collapse; width:100%; }
.ap-input { width:100%; background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.15);
  border-radius:8px; color:#e0eef5; padding:8px 10px; font-size:14px; font-weight:700;
  outline:none; text-transform:uppercase; letter-spacing:1px; font-family:inherit; }
.ap-input::placeholder { text-transform:none; letter-spacing:0; font-weight:400; color:#3a5a70; font-size:12px; }
.ap-input.valid  { border-color:#3b9ede; background:rgba(59,158,222,0.08); }
.ap-input.error  { border-color:#e05050; background:rgba(224,80,80,0.08); }
.ap-input:focus  { border-color:#5aaeee; }
.dropdown { position:absolute; top:100%; left:0; right:0; z-index:100; margin-top:3px;
  background:#0d1e30; border:1px solid rgba(255,255,255,0.15); border-radius:9px;
  overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.5); }
.dropdown-item { padding:9px 12px; cursor:pointer; display:flex; align-items:center; gap:8px;
  border-bottom:1px solid rgba(255,255,255,0.05); transition:background 0.12s; }
.dropdown-item:last-child { border-bottom:none; }
.dropdown-item:hover, .dropdown-item.focused { background:rgba(59,158,222,0.15); }
.di-code { font-size:13px; font-weight:700; color:#3b9ede; min-width:38px; letter-spacing:0.5px; }
.di-name { font-size:11px; color:#a0c0d0; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.di-icao { font-size:10px; color:#4a7a90; margin-left:auto; white-space:nowrap; padding-left:6px; }

/* Responsive grid helpers */
.grid-2col { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.grid-3col { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.flight-row-grid { display:grid; grid-template-columns:1fr 18px 1fr auto 32px; gap:6px; align-items:start; margin-bottom:6px; }
.ring-row { display:flex; gap:16px; align-items:center; }

/* Desktop enhancements */
@media (min-width:600px) {
  .app-inner { padding:20px 24px 0; }
  .modal-sheet { border-radius:16px !important; max-height:80vh; margin:auto; }
  .modal-wrap { align-items:center !important; padding:20px; }
}

/* Small phone adjustments */
@media (max-width:380px) {
  .grid-2col { grid-template-columns:1fr; }
  .grid-3col { grid-template-columns:1fr 1fr; }
  .flight-row-grid { grid-template-columns:1fr 14px 1fr auto 28px; gap:4px; }
  .di-icao { display:none; }
  .ring-row { flex-direction:column; align-items:flex-start; gap:10px; }
}
</style>

// ── Dynamic airport registry ──────────────────────────────────────────────────
// Starts with LOCAL_AIRPORTS (fallback), then merges OpenFlights data if online.
// activeDB and icaoMap are module-level refs updated after fetch.
let activeDB = { ...AIRPORTS };
let icaoMap = {};
Object.entries(activeDB).forEach(([iata,d]) => { if(d.icao) icaoMap[d.icao] = iata; });

// Called once on app mount — tries to fetch OpenFlights (~7600 airports)
// OpenFlights CSV columns: id,name,city,country,iata,icao,lat,lon,alt,tz,...
async function loadOpenFlights(onDone) {
  try {
    const url = `https://raw.githubusercontent.com/jpatokal/openflights/master/data/airports.dat?v=${APP_VERSION}`;
    const res = await fetch(url, { cache: "force-cache" });
    if (!res.ok) throw new Error("fetch failed");
    const text = await res.text();
    const lines = text.split("\n");
    const extended = { ...AIRPORTS }; // keep local overrides
    const newIcao = { ...icaoMap };
    let added = 0;
    for (const line of lines) {
      // Parse CSV respecting quoted fields
      const cols = [];
      let cur = "", inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { cols.push(cur); cur = ""; }
        else cur += c;
      }
      cols.push(cur);
      if (cols.length < 8) continue;
      const iata = cols[4].replace(/"/g,"").trim().toUpperCase();
      const icao = cols[5].replace(/"/g,"").trim().toUpperCase();
      const name = cols[1].replace(/"/g,"").trim();
      const lat  = parseFloat(cols[6]);
      const lon  = parseFloat(cols[7]);
      // Skip entries without valid IATA or coordinates
      if (!iata || iata === "\\N" || iata.length !== 3) continue;
      if (isNaN(lat) || isNaN(lon)) continue;
      // Don't overwrite our curated local entries
      if (!extended[iata]) {
        extended[iata] = { name, icao: icao !== "\\N" ? icao : "", lat, lon };
        added++;
      }
      if (icao && icao !== "\\N" && !newIcao[icao]) newIcao[icao] = iata;
    }
    activeDB = extended;
    icaoMap  = newIcao;
    onDone(added);
  } catch(e) {
    // Silent fallback — local DB stays active
    onDone(0);
  }
}

function resolveCode(raw) {
  const s = raw.trim().toUpperCase();
  if (activeDB[s]) return s;
  if (icaoMap[s]) return icaoMap[s];
  return null;
}

function searchAirports(query) {
  if (!query || query.length < 1) return [];
  const q = query.toUpperCase().trim();
  const results = [];
  for (const [iata, d] of Object.entries(activeDB)) {
    const matchCode = iata.startsWith(q) || (d.icao && d.icao.startsWith(q));
    const matchName = d.name.toUpperCase().includes(q);
    if (matchCode || matchName) results.push({ iata, ...d });
  }
  results.sort((a, b) => {
    const aExact = a.iata === q || a.icao === q ? 0 : 1;
    const bExact = b.iata === q || b.icao === q ? 0 : 1;
    if (aExact !== bExact) return aExact - bExact;
    const aCode = a.iata.startsWith(q) || (a.icao && a.icao.startsWith(q)) ? 0 : 1;
    const bCode = b.iata.startsWith(q) || (b.icao && b.icao.startsWith(q)) ? 0 : 1;
    return aCode - bCode;
  });
  return results.slice(0, 8);
}

// ── Physics ───────────────────────────────────────────────────────────────────
function getDoseRate(lat) {
  const a = Math.abs(lat);
  if (a < 15) return 1.5;
  if (a < 30) return 2.2;
  if (a < 45) return 3.5;
  if (a < 60) return 4.8;
  return 6.0;
}
function gcDistance(lat1,lon1,lat2,lon2) {
  const R=6371, r=d=>d*Math.PI/180;
  const a=Math.sin(r(lat2-lat1)/2)**2+Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(r(lon2-lon1)/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function effectiveLatitude(lat1,lon1,lat2,lon2) {
  const r=d=>d*Math.PI/180, deg=x=>x*180/Math.PI;
  const cosMax=Math.cos(r(lat1))*Math.cos(r(lat2))*Math.abs(Math.sin(r(lon2-lon1)));
  const peak=deg(Math.asin(Math.min(1,Math.sqrt(1-cosMax*cosMax))));
  return (Math.abs(lat1)+peak+Math.abs(lat2))/3;
}
function calcFlight(orig,dest,flFactor,solarFactor) {
  const A=activeDB[orig], B=activeDB[dest];
  if(!A||!B) return null;
  const distKm=gcDistance(A.lat,A.lon,B.lat,B.lon);
  const timeH=distKm/830;
  const effLat=effectiveLatitude(A.lat,A.lon,B.lat,B.lon);
  const doseUsv=getDoseRate(effLat)*flFactor*solarFactor*timeH;
  return {distKm:Math.round(distKm),timeH,doseUsv,effLat};
}

function fmtDose(usv) {
  if (usv>=1000) return `${(usv/1000).toFixed(2)} mSv`;
  return `${usv.toFixed(1)} µSv`;
}
function fmtTime(h) { return `${Math.floor(h)}h ${Math.round((h%1)*60)}m`; }

      {icon:"🌌", title:"¿Qué es la radiación cósmica?", body:`El universo está permanentemente bombardeado por rayos cósmicos: partículas subatómicas de alta energía (protones, núcleos de helio, electrones) que viajan a velocidades cercanas a la de la luz. Tienen origen tanto en el Sol como en fuentes extragalácticas —supernovas, púlsares, núcleos activos de galaxias— y alcanzan la Tierra constantemente.\n\nA nivel del suelo, la atmósfera nos protege absorbiendo la mayor parte. Pero a 35.000 pies (FL350), solo queda una fracción de esa protección: la dosis por radiación cósmica es entre 100 y 300 veces mayor que en tierra.`},
      {icon:"⚡", title:"Radiación ionizante: ¿qué significa?", body:`Se llama ionizante a la radiación con suficiente energía para arrancar electrones de los átomos, creando iones. Esto puede dañar el ADN celular directamente o generando radicales libres.\n\nExisten varios tipos: rayos gamma y X (electromagnética), partículas alfa (núcleos de helio), beta (electrones), y neutrones. A bordo de un avión se combinan principalmente fotones de alta energía y muones —partículas secundarias generadas cuando los rayos cósmicos chocan con la atmósfera superior.`},
      {icon:"📏", title:"Unidades: Sievert y la escala completa", body:`El Sievert (Sv) mide la dosis absorbida ponderada por el daño biológico que causa cada tipo de radiación en el tejido humano. Es la unidad oficial de protección radiológica (ICRP).\n\nLa escala completa, de menor a mayor:\n\n• 1 µSv (microsievert) = 0,000001 Sv\n  — Una Rx dental ≈ 5 µSv\n  — Un vuelo transatlántico ≈ 30–80 µSv\n\n• 1 mSv (millisievert) = 0,001 Sv\n  — Fondo natural anual en España ≈ 2,4 mSv\n  — Límite recomendado tripulación aérea: 20 mSv/año\n\n• 1 Sv = dosis aguda que empieza a causar síntomas (náuseas)\n• 4–5 Sv = dosis letal al 50% sin tratamiento (LD50)\n• >10 Sv = dosis letal con casi total seguridad\n\nPara contexto: toda la carrera de un piloto de largo radio raramente supera los 200–400 mSv acumulados, lejos del rango donde se observan efectos deterministas.\n\nTrabajadores de centrales nucleares:\n\nEl límite regulatorio para trabajadores de instalaciones nucleares es el mismo que para tripulación aérea: 20 mSv/año promediado en 5 años, con un máximo de 50 mSv en un solo año (ICRP 103, Directiva Euratom 2013/59).\n\nSin embargo, la exposición real media es muy inferior al límite. Según datos del OIEA y UNSCEAR, la dosis efectiva media anual de un trabajador de central nuclear en países con buenas prácticas radiológicas se sitúa entre 1 y 3 mSv/año — comparable o incluso inferior a la de un piloto de largo radio.\n\nEn perspectiva: un piloto de largo radio con programación intensa (80–100 sectores/año) puede acumular más dosis anual que el trabajador medio de una central nuclear.`},

      {icon:"🌌", title:"What is cosmic radiation?", body:`The universe is constantly bombarded by cosmic rays: high-energy subatomic particles (protons, helium nuclei, electrons) travelling at speeds close to the speed of light. They originate both from the Sun and from extragalactic sources — supernovae, pulsars, active galactic nuclei — and reach Earth continuously.\n\nAt ground level, the atmosphere absorbs most of this radiation. But at 35,000 feet (FL350), only a fraction of that protection remains: the cosmic radiation dose is 100 to 300 times higher than at sea level.`},
      {icon:"⚡", title:"Ionising radiation: what does it mean?", body:`Ionising radiation is radiation with enough energy to knock electrons off atoms, creating ions. This can directly damage cellular DNA or generate free radicals.\n\nSeveral types exist: gamma and X-rays (electromagnetic), alpha particles (helium nuclei), beta particles (electrons), and neutrons. On board an aircraft, the main components are high-energy photons and muons — secondary particles generated when cosmic rays collide with the upper atmosphere.`},
      {icon:"📏", title:"Units: Sievert and the full scale", body:`The Sievert (Sv) measures the absorbed dose weighted by the biological damage caused by each type of radiation in human tissue. It is the official unit of radiological protection (ICRP).\n\nThe full scale, from lowest to highest:\n\n• 1 µSv (microsievert) = 0.000001 Sv\n  — Dental X-ray ≈ 5 µSv\n  — Transatlantic flight ≈ 30–80 µSv\n\n• 1 mSv (millisievert) = 0.001 Sv\n  — Annual natural background (Spain) ≈ 2.4 mSv\n  — Recommended crew limit: 20 mSv/year\n\n• 1 Sv = acute dose that begins to cause symptoms (nausea)\n• 4–5 Sv = lethal dose for 50% without treatment (LD50)\n• >10 Sv = almost certainly lethal\n\nFor context: an entire long-haul pilot career rarely exceeds 200–400 mSv accumulated — far below the threshold where deterministic effects are observed.\n\nNuclear power plant workers:\n\nThe regulatory limit for nuclear facility workers is the same as for aircrew: 20 mSv/year averaged over 5 years, with a maximum of 50 mSv in any single year (ICRP 103, Euratom Directive 2013/59).\n\nHowever, real average exposure is well below the limit. According to IAEA and UNSCEAR data, the mean annual effective dose for a nuclear plant worker in countries with good radiological practices is between 1 and 3 mSv/year — comparable to or even lower than a long-haul pilot.\n\nIn perspective: a long-haul pilot with a heavy schedule (80–100 sectors/year) may accumulate more annual dose than the average nuclear plant worker.`},
      {icon:"☀️", title:"Solar maximum → less cosmic radiation", body:`This seems counterintuitive but has a precise physical explanation.\n\nThe highest-energy cosmic rays come from interstellar space (Galactic Cosmic Rays, GCR). To reach Earth they must cross the solar magnetic field — the heliosphere.\n\nDuring solar maximum, the Sun emits more solar wind: a flux of particles and magnetic field that inflates and strengthens the heliosphere. This more powerful magnetic shield deflects more GCR before they enter the inner solar system.\n\nResult: at solar maximum (as now, Cycle 25 ~2024–2026) the on-board dose is 10–20% lower than at solar minimum, especially on polar and high-latitude routes.\n\nNote: solar particle events (SPEs / solar flares) are the exception — they can temporarily spike the dose, though they are rare and brief.`},

function useLang() {
  const [lang, setLang] = useState(()=>{
    try { return localStorage.getItem("cr_lang")||"es"; } catch(e){ return "es"; }
  });
  const toggleLang = ()=>{
    const next = lang==="es"?"en":"es";
    try { localStorage.setItem("cr_lang", next); } catch(e){}
    setLang(next);
  };
  const t = LANG[lang];
  return { lang, toggleLang, t };
}

// ── AirportInput: text field with autocomplete ────────────────────────────────
function AirportInput({ value, onChange, placeholder }) {
  // resolvedKey = the confirmed IATA key (separate from display text)
  const [text, setText] = useState(value && activeDB[value] ? `${value} · ${activeDB[value].icao}` : "");
  const [resolvedKey, setResolvedKey] = useState(value && activeDB[value] ? value : "");
  const [focused, setFocused] = useState(false);
  const [focusIdx, setFocusIdx] = useState(0);
  const [suggestions, setSuggestions] = useState([]);
  const inputRef = useRef(null);

  function confirmItem(iata) {
    const ap = activeDB[iata];
    setText(`${iata} · ${ap.icao}`);
    setResolvedKey(iata);
    setSuggestions([]);
    setFocused(false);
    onChange(iata);
  }

  function handleChange(e) {
    const raw = e.target.value;
    setText(raw);
    setResolvedKey(""); // clear resolved while typing
    setSuggestions(searchAirports(raw));
    setFocusIdx(0);
    // Try direct resolve (user typed exact IATA or ICAO)
    const key = resolveCode(raw);
    if (key) {
      setResolvedKey(key);
      onChange(key);
    } else {
      onChange("");
    }
  }

  function handleKeyDown(e) {
    if (!suggestions.length) return;
    if (e.key === "ArrowDown") { e.preventDefault(); setFocusIdx(i=>Math.min(i+1,suggestions.length-1)); }
    if (e.key === "ArrowUp")   { e.preventDefault(); setFocusIdx(i=>Math.max(i-1,0)); }
    if (e.key === "Enter" || e.key === "Tab") {
      if (suggestions[focusIdx]) { e.preventDefault(); confirmItem(suggestions[focusIdx].iata); }
    }
    if (e.key === "Escape") { setSuggestions([]); }
  }

  function handleBlur() {
    setTimeout(() => {
      setFocused(false);
      setSuggestions([]);
      // If nothing resolved, restore last good value or clear
      if (!resolvedKey) {
        const fallback = value && activeDB[value] ? value : "";
        if (fallback) { setText(`${fallback} · ${activeDB[fallback].icao}`); setResolvedKey(fallback); }
        else { setText(""); onChange(""); }
      }
    }, 160);
  }

  const showDrop = focused && suggestions.length > 0;
  // Only show error if user typed something, dropdown is closed, and nothing is resolved
  const showError = text.length >= 2 && !resolvedKey && !showDrop;

  return (
    <div style={{position:"relative"}}>
      <input
        ref={inputRef}
        className={`ap-input ${resolvedKey ? "valid" : showError ? "error" : ""}`}
        value={text}
        onChange={handleChange}
        onFocus={()=>{ setFocused(true); if(text && !resolvedKey) setSuggestions(searchAirports(text)); }}
        onBlur={handleBlur}
        onKeyDown={handleKeyDown}
        placeholder={placeholder||"IATA o OACI…"}
        autoCorrect="off" autoCapitalize="characters" spellCheck="false"
      />
      {resolvedKey && (
        <div style={{fontSize:10,color:"#3b9ede",marginTop:3,lineHeight:1.4}}>
          ✓ {activeDB[resolvedKey].name}
        </div>
      )}
      {showError && (
        <div style={{fontSize:10,color:"#e06060",marginTop:3}}>Código no encontrado</div>
      )}
      {showDrop && (
        <div className="dropdown">
          {suggestions.map((item,i)=>(
            <div key={item.iata} className={`dropdown-item${i===focusIdx?" focused":""}`}
              onMouseDown={()=>confirmItem(item.iata)}>
              <span className="di-code">{item.iata}</span>
              <span className="di-name">{item.name}</span>
              <span className="di-icao">{item.icao}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Toggle({value,onChange,label}) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>onChange(!value)}>

          borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>

function ProgressRing({pct,size=90,stroke=8,color}) {
  const r=(size-stroke)/2, circ=2*Math.PI*r;
  const dash=Math.min(pct/100,1)*circ;
  const col=pct>80?"#e05030":pct>50?"#e09020":color;
  return (
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth={stroke}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          style={{transition:"stroke-dasharray 0.7s ease"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",
        alignItems:"center",justifyContent:"center",lineHeight:1.2}}>
        <div style={{fontSize:16,fontWeight:800,color:col}}>{Math.round(pct)}%</div>
        <div style={{fontSize:8,color:"#6a8fa8",textTransform:"uppercase",letterSpacing:0.5}}>ICRP</div>
      </div>
    </div>
  );
}

function CompareBar({label,icon,value,max,color,highlight}) {
  const pct=Math.min(100,(value/max)*100);
  return (
    <div style={{marginBottom:8,background:highlight?"rgba(255,160,0,0.07)":"transparent",
      borderRadius:8,padding:"5px 8px",border:highlight?"1px solid rgba(255,160,0,0.25)":"1px solid transparent"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11.5,marginBottom:3,color:"#c8d8e0"}}>
        <span>{icon} {label}</span>
        <span style={{fontVariantNumeric:"tabular-nums",color:highlight?"#ffa000":"#e0eef5",fontWeight:highlight?700:400}}>
          {fmtDose(value)}
        </span>
      </div>
      <div style={{height:5,background:"rgba(255,255,255,0.07)",borderRadius:4,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:4,transition:"width 0.6s ease"}}/>
      </div>
    </div>
  );
}

function Chip({label,icon,accent}) {
  return (
    <span style={{
      background:accent?"rgba(59,158,222,0.12)":"rgba(255,255,255,0.05)",
      border:`1px solid ${accent?"rgba(59,158,222,0.25)":"rgba(255,255,255,0.08)"}`,
      borderRadius:6,padding:"2px 8px",fontSize:10.5,fontWeight:600,
      color:accent?"#3b9ede":"#8aacbc",whiteSpace:"nowrap"

}

// ── FlightRow ─────────────────────────────────────────────────────────────────
function FlightRow({flight,solarFactor,onChange,onRemove,onAddReturn,t}) {
  const {id,orig,dest,legs,flIdx=1}=flight;
  const valid=orig&&dest&&orig!==dest&&activeDB[orig]&&activeDB[dest];
  const flFactor=FL_OPTIONS[flIdx].factor;
  const calc=valid?calcFlight(orig,dest,flFactor,solarFactor):null;
  const totalUsv=calc?calc.doseUsv*legs:0;
  return (
    <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",
      borderRadius:12,padding:"12px 12px 10px",marginBottom:8}}>
      <div className="flight-row-grid">
        <AirportInput value={orig} onChange={v=>onChange(id,"orig",v)} placeholder={t.originPlaceholder}/>
        <div style={{textAlign:"center",color:"#4a6a80",fontSize:13,paddingTop:10}}>→</div>
        <AirportInput value={dest} onChange={v=>onChange(id,"dest",v)} placeholder={t.destPlaceholder}/>
        <div style={{display:"flex",alignItems:"center",gap:4,paddingTop:8}}>
          <button onClick={()=>onChange(id,"legs",Math.max(1,legs-1))} style={btnSmall}>−</button>
          <span style={{fontSize:13,fontWeight:700,color:"#3b9ede",minWidth:16,textAlign:"center"}}>{legs}</span>
          <button onClick={()=>onChange(id,"legs",legs+1)} style={btnSmall}>+</button>
        </div>
        <button onClick={()=>onRemove(id)} style={{
          background:"rgba(200,60,60,0.15)",border:"1px solid rgba(200,60,60,0.25)",
          borderRadius:6,color:"#e06060",cursor:"pointer",fontSize:14,padding:"4px 7px",fontWeight:700,marginTop:8
        }}>×</button>
      </div>

      {/* FL selector per flight */}
      <div style={{display:"flex",gap:4,marginTop:8,marginBottom:4}}>
        {FL_OPTIONS.map((fl,i)=>{
          const on=flIdx===i;
          return (
            <button key={i} onClick={()=>onChange(id,"flIdx",i)} style={{
              flex:1,padding:"4px 2px",border:"none",borderRadius:5,cursor:"pointer",
              fontSize:10,fontWeight:700,
              background:on?"rgba(59,158,222,0.2)":"rgba(255,255,255,0.05)",
              color:on?"#3b9ede":"#4a6a80",
              borderBottom:on?"2px solid #3b9ede":"2px solid transparent",
              transition:"all 0.15s"
            }}>{fl.label}</button>
          );
        })}
      </div>

      {valid&&calc?(
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:4,alignItems:"center"}}>
          <Chip icon="📏" label={`${(calc.distKm/1000).toFixed(1)} mil km`}/>
          <Chip icon="⏱" label={fmtTime(calc.timeH)}/>
          <Chip icon="☢️" label={`${fmtDose(calc.doseUsv)}/leg`} accent/>
          {legs>1&&<Chip icon="✖️" label={`${fmtDose(totalUsv)} (×${legs})`} accent/>}
          <button onClick={()=>onAddReturn(dest,orig,flIdx)} style={{
            marginLeft:"auto",
            background:"rgba(40,160,100,0.12)",border:"1px solid rgba(40,160,100,0.3)",
            borderRadius:6,color:"#40c080",cursor:"pointer",
            fontSize:10.5,fontWeight:700,padding:"3px 10px",whiteSpace:"nowrap",
            display:"flex",alignItems:"center",gap:4
          }}>
            {t.addReturnBtn}
          </button>
        </div>
      ):orig&&dest&&orig===dest?(
        <div style={{fontSize:11,color:"#e09020"}}>{t.sameAirportWarn}</div>
      ):null}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const { lang, toggleLang, t } = useLang();

  const SOLAR_OPTIONS_T = [
    { label:t.solarMin, sublabel:t.solarMinSub, factor:1.18 },
    { label:t.solarMid, sublabel:t.solarMidSub, factor:1.00 },
    { label:t.solarMax, sublabel:t.solarMaxSub, factor:0.87 },
  ];
  const [tab,setTab]=useState("planner");
  const [showInfo,setShowInfo]=useState(false);
  const [showPregnant,setShowPregnant]=useState(false);
  const [showOnboarding,setShowOnboarding]=useState(()=>{
    try { return !localStorage.getItem("cr_onboarded"); }
    catch(e) { return true; }
  });
  const [dbStatus,setDbStatus]=useState("loading");
  const [solarIdx,setSolarIdx]=useState(2);
  const [showCareer,setShowCareer]=useState(false);
  const [careerYears,setCareerYears]=useState(15);
  const [savedAt,setSavedAt]=useState(null);

  // ── Month navigation ──────────────────────────────────────────────────────
  const todayKey = ()=>{
    const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`;
  };
  const [currentMonth,setCurrentMonth]=useState(()=>{
    try { return localStorage.getItem("cr_current_month")||todayKey(); }
    catch(e){ return todayKey(); }
  });

  function monthLabel(key) {
    const [y,m]=key.split("-");
    const locale = lang==="en" ? "en-GB" : "es-ES";
    return new Date(Number(y),Number(m)-1,1)
      .toLocaleDateString(locale,{month:"long",year:"numeric"});
  }
  function shiftMonth(key,delta) {
    const [y,m]=key.split("-").map(Number);
    const d=new Date(y,m-1+delta,1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  }
  function canGoForward(key) {
    const limit=shiftMonth(todayKey(),12);
    return key < limit;
  }

  // ── All months storage ────────────────────────────────────────────────────
  function loadAllMonths() {
    try { return JSON.parse(localStorage.getItem("cr_months")||"{}"); }
    catch(e){ return {}; }
  }
  function saveAllMonths(all) {
    try { localStorage.setItem("cr_months",JSON.stringify(all)); } catch(e){}
  }
  function loadMonthFlights(key) {
    const all=loadAllMonths();
    const saved=all[key];
    if(saved&&Array.isArray(saved)&&saved.length>0)
      return saved.map(f=>({...f,id:mkId()}));
    return [];
  }

  const [flights,setFlights]=useState(()=>{
    // Try new per-month storage first, fall back to legacy cr_flights
    const monthFlights=loadMonthFlights(
      (() => { try{return localStorage.getItem("cr_current_month")||todayKey();}catch(e){return todayKey();} })()
    );
    if(monthFlights.length>0) return monthFlights;
    // Migrate legacy data
    try {
      const legacy=localStorage.getItem("cr_flights");
      if(legacy){
        const parsed=JSON.parse(legacy);
        if(Array.isArray(parsed)&&parsed.length>0)
          return parsed.map(f=>({...f,id:mkId()}));
      }
    } catch(e){}
    return [];
  });

  // Autosave whenever flights change
  useEffect(()=>{
    const all=loadAllMonths();
    all[currentMonth]=flights.map(({orig,dest,legs})=>({orig,dest,legs}));
    saveAllMonths(all);
    try{ localStorage.setItem("cr_current_month",currentMonth); }catch(e){}
    setSavedAt(Date.now());
  },[flights,currentMonth]);

  // Load flights when month changes
  function goToMonth(key) {
    // Save current first (autosave handles it via useEffect, but do it synchronously too)
    const all=loadAllMonths();
    all[currentMonth]=flights.map(({orig,dest,legs})=>({orig,dest,legs}));
    saveAllMonths(all);
    setCurrentMonth(key);
    setFlights(loadMonthFlights(key));
  }

  // Count months that have saved flights
  function savedMonthsCount() {
    const all=loadAllMonths();
    return Object.values(all).filter(v=>Array.isArray(v)&&v.length>0).length;
  }

  const [sOrig,setSOrig]=useState("MAD");
  const [sDest,setSDest]=useState("LAX");
  const [singleFlIdx,setSingleFlIdx]=useState(1);

  const solarFactor=SOLAR_OPTIONS[solarIdx].factor;

  const addFlight=()=>setFlights(f=>[...f,{id:mkId(),orig:"",dest:"",legs:1,flIdx:1}]);
  const removeFlight=id=>setFlights(f=>f.filter(x=>x.id!==id));
  const addReturnFlight=useCallback((orig,dest,flIdx)=>{
    setFlights(f=>[...f,{id:mkId(),orig,dest,legs:1,flIdx:flIdx??1}]);
  },[]);
  const updateFlight=useCallback((id,field,val)=>{
    setFlights(f=>f.map(x=>x.id===id?{...x,[field]:val}:x));
  },[]);

  // Load full airport DB on mount
  useEffect(()=>{
    loadOpenFlights(added=>{
      setDbStatus(added > 0 ? "full" : "local");
    });
  },[]);

  const validFlights=flights.filter(f=>f.orig&&f.dest&&f.orig!==f.dest&&activeDB[f.orig]&&activeDB[f.dest]);
  const monthlyUsv=validFlights.reduce((s,f)=>{
    const ff=FL_OPTIONS[f.flIdx??1].factor;
    return s+calcFlight(f.orig,f.dest,ff,solarFactor).doseUsv*f.legs;
  },0);
  const annualUsv=monthlyUsv*12;
  const pctIcrp=(annualUsv/20000)*100;
  const nonFlyer=2400;
  const barMax=Math.max(annualUsv+nonFlyer,annualUsv,nonFlyer,20000,14000)*1.08;

  const singleCalc=sOrig&&sDest&&sOrig!==sDest&&activeDB[sOrig]&&activeDB[sDest]
    ?calcFlight(sOrig,sDest,FL_OPTIONS[singleFlIdx].factor,solarFactor):null;

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#080f18 0%,#0b1825 60%,#07121c 100%)",
      color:"#e0eef5",paddingBottom:56}}>

      {/* Header */}
      <div style={{background:"rgba(255,255,255,0.025)",borderBottom:"1px solid rgba(255,255,255,0.07)",
        padding:"20px 20px 14px",textAlign:"center"}}>
        <div style={{fontSize:28,marginBottom:2}}>☢️</div>
        <h1 style={{margin:0,fontSize:18,fontWeight:800,letterSpacing:-0.5,color:"#e8f4fc"}}>
          {t.appTitle}
        </h1>
        <p style={{margin:"4px auto 0",fontSize:10,color:"#4a6a80",maxWidth:340,lineHeight:1.5}}>
          {t.appSubtitle}
        </p>
        <div style={{marginTop:6,display:"flex",justifyContent:"center"}}>
          {dbStatus==="loading"&&<span style={{fontSize:9.5,color:"#4a6a80",background:"rgba(255,255,255,0.05)",padding:"2px 10px",borderRadius:99}}>{t.dbLoading}</span>}
          {dbStatus==="full"&&<span style={{fontSize:9.5,color:"#3a9a5a",background:"rgba(40,160,80,0.1)",border:"1px solid rgba(40,160,80,0.2)",padding:"2px 10px",borderRadius:99}}>{t.dbFull}</span>}
          {dbStatus==="local"&&<span style={{fontSize:9.5,color:"#8a7040",background:"rgba(160,120,40,0.1)",border:"1px solid rgba(160,120,40,0.2)",padding:"2px 10px",borderRadius:99}}>{t.dbLocal}</span>}
        </div>
        {/* Language toggle — below db status */}
        <div style={{marginTop:8,display:"flex",justifyContent:"center"}}>
          <button onClick={toggleLang} style={{
            background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",
            borderRadius:8,color:"#a0c0d0",cursor:"pointer",
            fontSize:11,fontWeight:700,padding:"4px 14px",letterSpacing:0.5
          }}>{lang==="es"?"🇬🇧 EN":"🇪🇸 ES"}</button>
        </div>

      <div className="app-inner" style={{maxWidth:500,margin:"0 auto",padding:"14px 14px 0"}}>

            </div>

          {/* Career summary card — shown inline when toggle is on */}
          {showCareer&&validFlights.length>0&&monthlyUsv>0&&(
            <div style={{marginTop:12,background:"rgba(160,96,208,0.07)",border:"1px solid rgba(160,96,208,0.2)",borderRadius:12,padding:"12px 14px"}}>
              <div style={{fontSize:10,color:"#a060d0",fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,marginBottom:8}}>
                {t.careerTitle} · {careerYears} {t.careerYearsLabel}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
                {[
                  {l:t.careerFlightDose,v:fmtDose(annualUsv*careerYears),c:"#a060d0"},
                  {l:t.careerCTEquiv,v:`${(annualUsv*careerYears/7000).toFixed(1)}×`},
                  {l:t.careerNaturalBg,v:fmtDose(nonFlyer*careerYears)},
                ].map(s=>(
                  <div key={s.l} style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"8px 6px",textAlign:"center"}}>
                    <div style={{fontSize:9,color:"#6a8fa8",textTransform:"uppercase",letterSpacing:0.4,marginBottom:2}}>{s.l}</div>
                    <div style={{fontSize:12,fontWeight:700,color:s.c||"#e0eef5"}}>{s.v}</div>
                  </div>
                ))}
              </div>
              <div style={{fontSize:10.5,color:"#7a50a0",lineHeight:1.6,padding:"6px 8px",background:"rgba(160,96,208,0.06)",borderRadius:7}}>

            </div>

        {/* Tabs + info button */}
        <div style={{display:"flex",gap:4,marginBottom:12,alignItems:"stretch"}}>

            borderRadius:10,color:"#6a8fa8",cursor:"pointer",fontSize:12,
            padding:"0 13px",fontWeight:700,flexShrink:0,transition:"all 0.18s"
          }} title="Información">{t.infoBtn}</button>
        </div>

        {/* ══ PLANNER ══ */}

                  {monthLabel(currentMonth)}

                  {currentMonth===todayKey()
                    ? t.monthCurrent
                    : currentMonth < todayKey() ? t.monthPast : t.monthFuture}
                  {savedMonthsCount()>1&&<span style={{marginLeft:6,color:"#3a7a50"}}>· {savedMonthsCount()} {t.monthsSaved}</span>}

                borderRadius:8,
                color:canGoForward(currentMonth)?"#a0c0d0":"#2a3a45",
                cursor:canGoForward(currentMonth)?"pointer":"default",
                fontSize:16,padding:"4px 12px",fontWeight:700,lineHeight:1
              }}>›</button>
            </div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{fontSize:11,color:"#6a8fa8",fontWeight:700,textTransform:"uppercase",letterSpacing:0.8}}>
                  {t.flightsLabel} · <span style={{color:"#e0eef5"}}>{flights.length}</span>

                  }}>{t.clearBtn}</button>

                          <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
                            <div style={{fontSize:9,color:"#8a7040",textTransform:"uppercase",letterSpacing:0.6,marginBottom:3}}>{t.pregnantMonthlyDose}</div>

                    {label:t.barAnnualTotal,icon:"🧍✈️",value:annualUsv+nonFlyer,color:"linear-gradient(90deg,#2a5aa8,#6a9ede)",highlight:true},
                    {label:t.barNonFlyer,icon:"🧍",value:2400,color:"#4a7a4a"},

                    {label:t.barPET,icon:"⚛️",value:14000,color:"#8a4a6a"},

                {/* FL comparison visual */}
                <div style={CARD}>
                  <div style={LABEL}>{t.flVisualTitle}</div>
                  {FL_OPTIONS.map((fl,i)=>{
                    const baseRef = 3.5;
                    const fl390Factor = FL_OPTIONS[2].factor; // FL390 = reference
                    const rate = (baseRef * fl.factor * SOLAR_OPTIONS[solarIdx].factor).toFixed(2);
                    const maxRate = baseRef * FL_OPTIONS[FL_OPTIONS.length-1].factor * SOLAR_OPTIONS[solarIdx].factor;
                    const pct = (rate / maxRate) * 100;
                    const isRef = i === 2; // FL390 is reference
                    const diffVsFL390 = ((fl.factor / fl390Factor - 1) * 100).toFixed(0);
                    const diffSign = fl.factor > fl390Factor ? "+" : "";

                      <div key={fl.label} style={{

                      }}>

                            {isRef&&<span style={{fontSize:9,color:"#e0c070",background:"rgba(224,192,112,0.15)",border:"1px solid rgba(224,192,112,0.3)",borderRadius:99,padding:"1px 6px"}}>REF</span>}
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            {!isRef&&<span style={{fontSize:9,color:fl.factor>fl390Factor?"#e06060":"#60c090"}}>
                              {diffSign}{diffVsFL390}% vs FL390
                            </span>}
                            <span style={{fontSize:11,fontWeight:700,fontVariantNumeric:"tabular-nums",
                              color:isRef?"#e0c070":"#5a7a8a"}}>{rate} µSv/h</span>
                          </div>
                        </div>
                        <div style={{height:5,background:"rgba(255,255,255,0.07)",borderRadius:3,overflow:"hidden"}}>
                          <div style={{width:`${pct}%`,height:"100%",borderRadius:3,
                            background:isRef?"linear-gradient(90deg,#b08020,#e0c040)":colors[i],transition:"width 0.5s ease"}}/>
                        </div>
                      </div>
                    );
                  })}
                  <div style={{fontSize:9.5,color:"#2a4a5a",marginTop:4,lineHeight:1.5}}>
                    {t.flVisualRef}
                  </div>

                {/* Export PDF button */}
                <button onClick={()=>exportPDF({

            {singleCalc&&(

                  <div style={{fontSize:46,fontWeight:800,letterSpacing:-1.5,color:"#3b9ede",margin:"5px 0 3px"}}>
                    {fmtDose(singleCalc.doseUsv)}
                  </div>
                  <div style={{fontSize:11.5,color:"#6a8fa8"}}>
                    ≈ {(singleCalc.doseUsv/20).toFixed(1)} {t.chestXrayEquiv} · {(singleCalc.doseUsv/5).toFixed(0)} {t.dentalXrayEquiv}
                  </div>
                </div>
                <div className="grid-3col" style={{...CARD}}>
                  {[
                    {l:t.singleDistance,v:`${(singleCalc.distKm/1000).toFixed(1)} mil km`},
                    {l:t.singleDuration,v:fmtTime(singleCalc.timeH)},
                    {l:t.singleEffRate,v:`${(getDoseRate(singleCalc.effLat)*FL_OPTIONS[singleFlIdx].factor*solarFactor).toFixed(2)} µSv/h`,c:"#3b9ede"},
                  ].map(s=>(
                    <div key={s.l} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                      <div style={{fontSize:9.5,color:"#6a8fa8",textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>{s.l}</div>

                  <div style={{...CARD,background:"rgba(160,96,208,0.07)",border:"1px solid rgba(160,96,208,0.2)"}}>

                    <div style={{fontSize:10,color:"#7a50a0",marginTop:6}}>
                      {t.careerSingleNote}

                  </div>
                )}

          </>
        )}

        <div style={{fontSize:9.5,color:"#2a4a60",lineHeight:1.6,textAlign:"center",padding:"10px 8px 0"}}>
          {t.disclaimer}
          <br/><span style={{color:"#1e3a50"}}>v{APP_VERSION}</span>
        </div>
      </div>

      {showInfo&&<InfoModal t={t} onClose={()=>setShowInfo(false)}/>}
      {showOnboarding&&<OnboardingModal t={t} onDismiss={()=>setShowOnboarding(false)} onNever={()=>{ localStorage.setItem("cr_onboarded","1"); setShowOnboarding(false); }}/>}

}

// ── Detect platform ───────────────────────────────────────────────────────────
function detectPlatform() {
  const ua = navigator.userAgent;
  const isIOS = /iPhone|iPad|iPod/.test(ua);
  const isAndroid = /Android/.test(ua);
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches
    || window.navigator.standalone === true;
  return { isIOS, isAndroid, isDesktop: !isIOS && !isAndroid, isStandalone };
}

// ── OnboardingModal ───────────────────────────────────────────────────────────
function OnboardingModal({ onDismiss, onNever, t }) {
  const { isIOS, isAndroid, isStandalone } = detectPlatform();
  if (isStandalone) { onNever(); return null; }

  const es = LANG.es;
  const en = LANG.en;
  const stepsES = isIOS ? es.onboardStepsIos : isAndroid ? es.onboardStepsAndroid : es.onboardStepsDesktop;
  const stepsEN = isIOS ? en.onboardStepsIos : isAndroid ? en.onboardStepsAndroid : en.onboardStepsDesktop;
  const platformES = isIOS ? es.onboardPlatformIos : isAndroid ? es.onboardPlatformAndroid : es.onboardPlatformDesktop;
  const platformEN = isIOS ? en.onboardPlatformIos : isAndroid ? en.onboardPlatformAndroid : en.onboardPlatformDesktop;
  const platformColor = isIOS ? "#3b9ede" : isAndroid ? "#5aaa5a" : "#a060d0";
  const platformIcon = isIOS ? "🍎" : isAndroid ? "🤖" : "💻";

  return (
    <div style={{
      position:"fixed",inset:0,zIndex:2000,
      background:"rgba(0,0,0,0.75)",
      display:"flex",alignItems:"center",justifyContent:"center",
      backdropFilter:"blur(6px)",padding:"20px 16px",
      overflowY:"auto"
    }}>
      <div style={{
        width:"100%",maxWidth:420,
        background:"linear-gradient(160deg,#0d1e2e,#091622)",

        {/* Icon + bilingual title */}
        <div style={{textAlign:"center",marginBottom:18}}>
          <div style={{fontSize:36,marginBottom:6}}>📲</div>
          <div style={{fontSize:16,fontWeight:800,color:"#e8f4fc",marginBottom:2}}>
            {es.onboardTitle} · {en.onboardTitle}
          </div>
          <div style={{fontSize:10,color:"#4a6a80",lineHeight:1.5}}>
            {es.onboardSubtitle}
          </div>
          <div style={{fontSize:10,color:"#3a5a70",lineHeight:1.5,marginTop:2}}>
            {en.onboardSubtitle}
          </div>
        </div>

        {/* Platform badge */}
        <div style={{
          display:"flex",justifyContent:"center",marginBottom:14
        }}>
          <div style={{
            display:"inline-flex",alignItems:"center",gap:6,
            background:`rgba(${platformColor==="#3b9ede"?"59,158,222":platformColor==="#5aaa5a"?"90,170,90":"160,96,208"},0.12)`,
            border:`1px solid ${platformColor}44`,
            borderRadius:99,padding:"3px 14px",fontSize:10.5,
            color:platformColor,fontWeight:600
          }}>
            {platformIcon} {platformES} · {platformEN}
          </div>
        </div>

        {/* Steps — bilingual */}
        <div style={{marginBottom:16}}>
          {stepsES.map((s,i)=>(
            <div key={i} style={{
              display:"flex",gap:10,alignItems:"flex-start",
              marginBottom: i < stepsES.length-1 ? 10 : 0
            }}>
              <div style={{
                width:24,height:24,borderRadius:"50%",flexShrink:0,
                background:"rgba(59,158,222,0.15)",border:"1px solid rgba(59,158,222,0.3)",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:10,fontWeight:800,color:"#3b9ede",marginTop:2
              }}>{i+1}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:"#b0cfe0",lineHeight:1.5}}>
                  <span style={{fontSize:14,marginRight:5}}>{s.icon}</span>
                  {s.text}
                </div>
                <div style={{fontSize:11,color:"#4a6a80",lineHeight:1.5,marginTop:1}}>
                  {stepsEN[i].text}
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* iOS hint — bilingual */}
        {isIOS && (
          <div style={{
            background:"rgba(59,158,222,0.07)",border:"1px solid rgba(59,158,222,0.2)",
            borderRadius:10,padding:"8px 12px",marginBottom:14,
            fontSize:10.5,color:"#6a9ab0",lineHeight:1.5
          }}>
            {es.onboardIosWarn}<br/>
            <span style={{color:"#3a5a70"}}>{en.onboardIosWarn}</span>
          </div>
        )}

        {/* Buttons — bilingual */}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <button onClick={onNever} style={{
            width:"100%",padding:"12px",
            background:"linear-gradient(135deg,#1a6fa8,#0e4f80)",
            border:"none",borderRadius:11,color:"#fff",
            fontWeight:700,fontSize:12,cursor:"pointer",lineHeight:1.4
          }}>
            {es.onboardNever}<br/>
            <span style={{fontWeight:400,opacity:0.8,fontSize:11}}>{en.onboardNever}</span>
          </button>
          <button onClick={onDismiss} style={{
            width:"100%",padding:"9px",
            background:"transparent",
            border:"1px solid rgba(255,255,255,0.1)",
            borderRadius:11,color:"#6a8fa8",
            fontWeight:600,fontSize:11,cursor:"pointer",lineHeight:1.4
          }}>
            {es.onboardLater} · {en.onboardLater}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── PDF Export ────────────────────────────────────────────────────────────────
function exportPDF({ validFlights, solarFactor, solarLabel, t,
  monthlyUsv, annualUsv, nonFlyer, showCareer, careerYears, monthName }) {

  const isEn = t.pdfCode === "Code";
  const now = new Date();
  const dateStr = now.toLocaleDateString(isEn ? "en-GB" : "es-ES", { day:"2-digit", month:"2-digit", year:"numeric" });
  const pdfMonthName = monthName || now.toLocaleDateString(isEn ? "en-GB" : "es-ES", { month:"long", year:"numeric" });

  const rows = validFlights.map(f => {
    const ff=FL_OPTIONS[f.flIdx??1].factor; const c = calcFlight(f.orig, f.dest, ff, solarFactor);
    const total = c.doseUsv * f.legs;
    return `
      <tr>
        <td>${f.orig} → ${f.dest}</td>
        <td>${activeDB[f.orig]?.name||""} → ${activeDB[f.dest]?.name||""}</td>
        <td class="num">${FL_OPTIONS[f.flIdx??1].label}</td>
        <td class="num">${(c.distKm/1000).toFixed(1)} km</td>
        <td class="num">${Math.floor(c.timeH)}h ${Math.round((c.timeH%1)*60)}m</td>
        <td class="num">${fmtDose(c.doseUsv)}</td>
        <td class="num">× ${f.legs}</td>
        <td class="num bold">${fmtDose(total)}</td>
      </tr>`;
  }).join("");

  const refs = [
    [isEn?"Dental X-ray":"Rx dental",              "5 µSv",                      (monthlyUsv/5).toFixed(1)],
    [isEn?"Chest X-ray":"Rx tórax",                "20 µSv",                     (monthlyUsv/20).toFixed(1)],
    [isEn?"Mammography":"Mamografía",              "400 µSv",                    (monthlyUsv/400).toFixed(2)],
    [isEn?"Chest CT":"TAC tórax",                  isEn?"7,000 µSv":"7.000 µSv", (monthlyUsv/7000).toFixed(3)],
    [isEn?"Natural background/year":"Fondo natural/año", isEn?"2,400 µSv":"2.400 µSv", (annualUsv/2400).toFixed(2)],
    [isEn?"Crew limit/year":"Límite tripul./año",  isEn?"20,000 µSv":"20.000 µSv",(annualUsv/20000*100).toFixed(1)+"%"],
  ];

  const html = `<!DOCTYPE html>
<html lang="${isEn?"en":"es"}">
<head>
<meta charset="UTF-8"/>
<title>${t.pdfTitle} · ${pdfMonthName}</title>
<style>
  @page { margin: 18mm 16mm; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size:11px; color:#1a2a35; background:#fff; }
  .header { display:flex; justify-content:space-between; align-items:flex-start;
    border-bottom:2.5px solid #1a6fa8; padding-bottom:10px; margin-bottom:18px; }
  .title { font-size:20px; font-weight:800; color:#1a6fa8; letter-spacing:-0.5px; }
  .subtitle { font-size:11px; color:#5a7a8a; margin-top:3px; }
  .meta { text-align:right; font-size:10px; color:#6a8a9a; line-height:1.8; }
  .section { margin-bottom:18px; }
  .section-title { font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:0.8px; color:#5a7a8a; margin-bottom:8px;
    padding-bottom:4px; border-bottom:1px solid #e0eef5; }
  .summary-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
  .stat-box { background:#f0f6fa; border:1px solid #d0e4f0; border-radius:8px;
    padding:10px 12px; text-align:center; }
  .stat-label { font-size:9px; color:#6a8a9a; text-transform:uppercase; letter-spacing:0.6px; margin-bottom:4px; }
  .stat-value { font-size:16px; font-weight:800; color:#1a6fa8; }
  .stat-sub { font-size:9px; color:#8aacbc; margin-top:2px; }
  table { width:100%; border-collapse:collapse; font-size:10px; }
  th { background:#1a6fa8; color:#fff; padding:6px 8px; text-align:left;
    font-weight:600; font-size:9.5px; letter-spacing:0.3px; }
  th.num, td.num { text-align:right; }
  td { padding:5px 8px; border-bottom:1px solid #edf3f7; color:#2a3a45; }
  tr:last-child td { border-bottom:none; }
  tr:nth-child(even) td { background:#f8fbfd; }
  td.bold { font-weight:700; color:#1a6fa8; }
  .total-row td { background:#e8f2fa !important; font-weight:700;
    border-top:2px solid #1a6fa8; color:#1a2a35; }
  .refs-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .ref-box { background:#f8fbfd; border:1px solid #e0eef5; border-radius:6px; padding:8px 10px; }
  .ref-name { font-size:9px; color:#6a8a9a; margin-bottom:2px; }
  .ref-dose { font-size:10px; color:#4a6a7a; margin-bottom:3px; }
  .ref-eq { font-size:12px; font-weight:700; color:#1a6fa8; }
  .params { display:flex; gap:16px; font-size:10px; color:#5a7a8a; }
  .param { background:#f0f6fa; border-radius:5px; padding:4px 10px; }
  .footer { margin-top:20px; padding-top:10px; border-top:1px solid #e0eef5;
    font-size:9px; color:#9ab0bc; line-height:1.6; }
  .highlight { background:#e8f4ff; border:1px solid #b0d4ee; border-radius:6px;
    padding:10px 14px; display:flex; justify-content:space-between; align-items:center; }
  .hl-label { font-size:10px; color:#3a6a8a; font-weight:600; }
  .hl-value { font-size:22px; font-weight:800; color:#1a6fa8; }
  .hl-sub { font-size:9px; color:#6a9ab0; margin-top:1px; }
  ${showCareer ? `.career { background:#f5f0fc; border:1px solid #d0b8f0; border-radius:8px;
    padding:12px 14px; margin-top:14px; }
  .career-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:8px; }
  .career-stat { text-align:center; }
  .career-label { font-size:9px; color:#7a5aaa; text-transform:uppercase; letter-spacing:0.5px; }
  .career-value { font-size:14px; font-weight:800; color:#6030a0; margin-top:2px; }` : ""}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="title">${t.pdfTitle}</div>
    <div class="subtitle">${t.pdfSubtitle} · ${pdfMonthName}</div>
  </div>
  <div class="meta">
    ${t.pdfGenerated} ${dateStr}<br/>
    ${t.pdfFlightLevel}<br/>
    ${t.pdfSolarCycle} ${solarLabel}<br/>
    v${APP_VERSION}
  </div>
</div>

<div class="section">
  <div class="section-title">${t.pdfMonthlySummary}</div>
  <div style="display:flex;gap:12px;align-items:stretch;margin-bottom:14px;">
    <div class="highlight" style="flex:1;">
      <div>
        <div class="hl-label">${t.pdfMonthlySummary}</div>
        <div class="hl-value">${fmtDose(monthlyUsv)}</div>
        <div class="hl-sub">${isEn ? "Annual projection" : "Proyección anual"}: ${fmtDose(annualUsv)}</div>
      </div>
    </div>
    <div class="highlight" style="flex:1;">
      <div>
        <div class="hl-label">${t.pdfIcrcUsage}</div>
        <div class="hl-value" style="color:${annualUsv/20000>0.8?"#c03020":annualUsv/20000>0.5?"#b06010":"#1a6fa8"}">
          ${(annualUsv/20000*100).toFixed(1)}%
        </div>
        <div class="hl-sub">${t.pdfOf}</div>
      </div>
    </div>
  </div>
  <div class="params">
    <span class="param">✈ ${validFlights.reduce((s,f)=>s+f.legs,0)} ${t.pdfSectors}</span>
    <span class="param">📏 ${(validFlights.reduce((s,f)=>{ const c=calcFlight(f.orig,f.dest,FL_OPTIONS[f.flIdx??1].factor,solarFactor); return s+c.distKm*f.legs; },0)/1000).toFixed(0)} ${t.pdfKmTotal}</span>
    <span class="param">⏱ ${(()=>{ const h=validFlights.reduce((s,f)=>{ const c=calcFlight(f.orig,f.dest,FL_OPTIONS[f.flIdx??1].factor,solarFactor); return s+c.timeH*f.legs; },0); return `${Math.floor(h)}h ${Math.round((h%1)*60)}m`; })()}</span>
  </div>
</div>

<div class="section">
  <div class="section-title">${t.pdfBreakdown}</div>
  <table>
    <thead>
      <tr>
        <th>${t.pdfCode}</th><th>${t.pdfRoute}</th><th class="num">${t.pdfFL}</th><th class="num">${t.pdfDist}</th>
        <th class="num">${t.pdfTime}</th><th class="num">${t.pdfDosePerLeg}</th>
        <th class="num">${t.pdfLegs}</th><th class="num">${t.pdfTotal}</th>
      </tr>
    </thead>
    <tbody>
      ${rows}
      <tr class="total-row">
        <td colspan="7">${t.pdfTotalMonth}</td>
        <td class="num">${fmtDose(monthlyUsv)}</td>
      </tr>
    </tbody>
  </table>
</div>

<div class="section">
  <div class="section-title">${t.pdfEquivalences}</div>
  <div class="refs-grid">
    ${refs.map(([name,dose,eq])=>`
      <div class="ref-box">
        <div class="ref-name">${name}</div>
        <div class="ref-dose">${dose}</div>
        <div class="ref-eq">× ${eq}</div>
      </div>`).join("")}
  </div>
</div>

${showCareer ? `
<div class="career">
  <div style="font-size:10px;font-weight:700;color:#6030a0;text-transform:uppercase;letter-spacing:0.8px;">
    ${t.pdfCareerTitle} · ${careerYears}
  </div>
  <div style="font-size:9px;color:#9a70c0;margin:4px 0 8px;line-height:1.5;">
    ${t.pdfCareerNote} ${careerYears} ${t.pdfCareerNote2}
  </div>
  <div class="career-grid">
    <div class="career-stat">
      <div class="career-label">${t.pdfCareerFlight}</div>
      <div class="career-value">${fmtDose(annualUsv*careerYears)}</div>
    </div>
    <div class="career-stat">
      <div class="career-label">${t.pdfCareerCT}</div>
      <div class="career-value">${(annualUsv*careerYears/7000).toFixed(1)}×</div>
    </div>
    <div class="career-stat">
      <div class="career-label">${t.pdfCareerNatural}</div>
      <div class="career-value">${fmtDose(nonFlyer*careerYears)}</div>
    </div>
  </div>
  <div style="margin-top:8px;font-size:9px;color:#7a50a0;line-height:1.6;padding:6px 8px;background:#ede8f8;border-radius:5px;">
    ${t.pdfCareerTotal} <strong>${fmtDose((annualUsv+nonFlyer)*careerYears)}</strong>
  </div>
</div>` : ""}

<div class="footer">
  ${t.pdfFooter}
</div>

</body>
</html>`;

  const w = window.open("","_blank");
  w.document.write(html);
  w.document.close();
  w.onload = () => { w.focus(); w.print(); };
}

// ── InfoModal ─────────────────────────────────────────────────────────────────
// ── InfoModal ─────────────────────────────────────────────────────────────────
function InfoModal({onClose, t}) {
  const sections = t.infoSections;
  const [open, setOpen] = useState(null);
  return (
    <div className="modal-wrap" style={{
      position:"fixed",inset:0,zIndex:1000,
      background:"rgba(0,0,0,0.7)",
      display:"flex",alignItems:"flex-end",justifyContent:"center",
      backdropFilter:"blur(4px)",padding:0
    }} onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal-sheet" style={{
        width:"100%",maxWidth:500,
        background:"linear-gradient(180deg,#0d1e2e,#091622)",
        border:"1px solid rgba(255,255,255,0.1)",
        borderRadius:"18px 18px 0 0",
        maxHeight:"88vh",overflowY:"auto",
        WebkitOverflowScrolling:"touch",
        padding:"0 0 32px"
      }}>
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 4px"}}>
          <div style={{width:36,height:4,borderRadius:2,background:"rgba(255,255,255,0.2)"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 18px 14px"}}>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:"#e8f4fc"}}>{t.infoModalTitle}</div>
            <div style={{fontSize:10,color:"#4a6a80",marginTop:2}}>{t.infoModalSubtitle}</div>
          </div>
          <button onClick={onClose} style={{
            background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",
            borderRadius:8,color:"#6a8fa8",cursor:"pointer",fontSize:16,padding:"4px 10px",fontWeight:700
          }}>&#x2715;</button>
        </div>
        <div style={{padding:"0 14px"}}>
          {sections.map((s,i)=>(
            <div key={i} style={{
              marginBottom:8,
              background:"rgba(255,255,255,0.04)",
              border:"1px solid rgba(255,255,255,0.08)",
              borderRadius:12,overflow:"hidden"
            }}>
              <div onClick={()=>setOpen(open===i?null:i)} style={{
                display:"flex",alignItems:"center",gap:10,
                padding:"13px 14px",cursor:"pointer",
                background:open===i?"rgba(59,158,222,0.08)":"transparent"
              }}>
                <span style={{fontSize:18,flexShrink:0}}>{s.icon}</span>
                <span style={{fontSize:13,fontWeight:700,color:"#d0e8f4",flex:1,lineHeight:1.3}}>{s.title}</span>
                <span style={{color:"#4a6a80",fontSize:14,transition:"transform 0.2s",
                  transform:open===i?"rotate(180deg)":"rotate(0deg)"}}>&#x25be;</span>
              </div>
              {open===i&&(
                <div style={{padding:"0 14px 14px"}}>
                  {s.body.split("\n\n").map((para,j)=>(
                    <p key={j} style={{
                      fontSize:12.5,color:"#90b8cc",lineHeight:1.75,
                      margin:j===0?"4px 0 10px":"0 0 10px"
                    }}>{para}</p>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
        <div style={{fontSize:9.5,color:"#2a4050",textAlign:"center",padding:"12px 16px 0",lineHeight:1.6}}>
          {t.infoModalFooter}
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
